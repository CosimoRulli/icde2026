name = "spladev3-best-99-k100"
title = "Best known config: recall >= 99%, k=100, <= 5.7 GB, medoid + dotpacking8-f16"
description = "Best measured recall-99 config for SPLADE-v3 on MS-MARCO v1, k=100. Measured 2026-06-11: recall=99.12%, query time=5094 us, memory=5.39 GB (np=4000, cf=0.16, mf=4.0, qc=15, hf=0.4, first-sorted=true). cf=0.1 topped at 98.60% (not enough); cf=0.16 pushed past 99%. Value-type is dotpacking8-f16 (PackedSparseDataset<DotPacking8f16Encoder>): u16 gap-encoded component IDs + f16 values, SIMD dot product."
dataset = "SPLADE-v3 on MS-MARCO v1"

[settings]
k = 100
n-runs = 1
NUMA = "numactl --physcpubind='0' --localalloc"
build = true
metric = "RR@10"
delete = true

[folder]
data = "~/data/splade_v3/data"
index = "~/data/splade_v3/indexes"
qrels_path = "~/data/splade_v3/data/qrels.dev.small.tsv"
experiment = "."

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth_100.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "spladev3-best-99-k100"

[indexing_parameters]
n-postings = 4000
centroid-fraction = 0.16
clustering-algorithm = "random-kmeans-inverted-index-approx"
kmeans-doc-cut = 15
kmeans-pruning-factor = 0.0
knn = 0
max-fraction = 4.0
min-cluster-size = 10
pruning-strategy = "global-threshold"
summarization-strategy = "medoid"
value-type = "dotpacking8-f16"
component-type = "u16"

[query]

[query.recall_99]
query-cut = 15
heap-factor = 0.4
knn = 0
first-sorted = true
