name = "msmarco-v1-cocondenser-k100-summary_dotpacking8_f16-mem_budget_1.5-recall_99"
title = "msmarco-v1-cocondenser-k100-summary_dotpacking8_f16 - Recall 99%"
description = "Best config for msmarco-v1-cocondenser-k100-summary_dotpacking8_f16, memory budget 1.5, recall >= 99%. Reproduces the >=1.0-tier [new] R99 cocondenser cell (table 2943us / 7.4 GB). Extracted from grid build 15: measured 2902us / recall 0.9901 / 7.16 GB. summary_dotpacking8-scalar cannot reach R99 in this regime (3862us); dotpacking8-f16 keeps dotpacking-compressed components but stores f16 values, restoring f16-class latency at R99."

[folder]
data = "~/data/cocondenser/data"
index = "~/data/cocondenser/indexes"
qrels_path = "~/data/cocondenser/data/qrels.dev.small.tsv"
experiment = "."

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth_100.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "msmarco-v1-cocondenser-k100-summary_dotpacking8_f16-mem_budget_1.5-recall_99"

[settings]
k = 100
n-runs = 1
build = true
metric = "RR@10"
delete = true

[indexing_parameters]
centroid-fraction = 0.2
clustering-algorithm = "random-kmeans-inverted-index-approx"
kmeans-doc-cut = 15
kmeans-pruning-factor = 0.0
knn = 0
max-fraction = 6.0
min-cluster-size = 5
n-postings = 4000
pruning-strategy = "global-threshold"
summary-energy = 0.5
value-type = "dotpacking8-f16"

[query.recall_99]
query-cut = 12
heap-factor = 0.8
knn = 0
first-sorted = true
