description = "Auto-extracted best config for msmarco-v1-lilsr-k10-summary_blocked_sparse, memory budget 2.0, recall >= 99%. Filtered to shrunk grid (n in {3000,4000,6000,8000,10000}, cf=0.1, se in {0.4,0.5}, mf in {3.0,4.0}, qc in {4,6,8,10}, hf in {0.9,1.0}, fs=true). Source: pooled explorative + highmem f16 grids. Forward index encoder swapped from f16 to blocked-sparse, reusing the summary_f16 operating point (mem_budget label is provenance only)."

[folder]
data = "~/data/lilsr-big/data"
index = "~/data/lilsr-big/indexes"
qrels_path = "~/data/lilsr-big/data/qrels.dev.small.tsv"
experiment = "."

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
