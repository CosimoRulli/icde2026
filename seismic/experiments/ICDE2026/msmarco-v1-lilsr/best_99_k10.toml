name = "lilsr-best-99-k10"
title = "Best known config: recall >= 99%, k=10, <= 15.5 GB, medoid + blocked-sparse"
description = "Best measured recall-99 config for LiLSR (big) on MS-MARCO v1, k=10. Measured 2026-06-11 on this host: recall=99.08%, query time=5601 us, memory=14.92 GB (np=6500, mf=3.0). Value-type is blocked-sparse (PackedSparseDataset<BlockedSparseEncoder>): u16 component IDs + f16 values, no compression, SIMD AVX2/F16C/FMA dot product. component-type u16 required (LiLSR vocab < 65K). The NUMA line is required on multi-socket hosts for accurate query times. Grid still running (np=6000 builds pending) — may be updated with faster config."
dataset = "LiLSR (big) on MS-MARCO v1"

[settings]
k = 10
n-runs = 1
NUMA = "numactl --physcpubind='0' --localalloc"
build = true
metric = "RR@10"
delete = false

[folder]
data = "~/data/lilsr-big/data"
index = "~/data/lilsr-big/indexes"
qrels_path = "~/data/lilsr-big/data/qrels.dev.small.tsv"
experiment = "."

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "lilsr-best-99-k10"

[indexing_parameters]
n-postings = 6500
centroid-fraction = 0.1
clustering-algorithm = "random-kmeans-inverted-index-approx"
kmeans-doc-cut = 15
kmeans-pruning-factor = 0.0
knn = 0
max-fraction = 3.0
min-cluster-size = 10
pruning-strategy = "global-threshold"
summarization-strategy = "medoid"
value-type = "dotpackingsparse-f16"
component-type = "u16"

[query]

[query.recall_99]
query-cut = 7
heap-factor = 0.4
knn = 0
first-sorted = true
