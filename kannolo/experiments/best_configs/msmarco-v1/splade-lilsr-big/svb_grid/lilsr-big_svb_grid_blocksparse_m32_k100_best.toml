name =        "lilsr-big_svb_grid_blocksparse_m32_k100_best"
title =       "BlockedSparse (fast f16 kernel, in-memory convert) -- m=32, k=100"
description = "In-memory convert of the EXISTING plain-f16 index to the blocked-sparse encoder (--convert-in-memory). Reuses the f16 graph + f16 EGB permutation, so recall == the f16 \\hnswsvb rows; only the (faster) SIMD kernel changes. No rebuild."
dataset =     "SPLADE v3 lilsr-big on MS-MARCO"
dataset-type = "sparse"
component-type = "u16"
value-type =  "f16"
build-command =       "./target/release/hnsw_build"
permutation-command = "./target/release/hnsw_egb_permutation"
query-command =       "./target/release/hnsw_compress_search"
encoder =     "plain"

[settings]
k =           100
num-runs =    1
NUMA =        "numactl --physcpubind='0' --localalloc"
build =       true     # build the plain-f16 index (converted to blocked-sparse in memory at query time)
permutation = true     # build the plain-f16 EGB permutation from the index
convert_target_encoder = "blocked-sparse"
metric =      ""

[folder]
data =        "~/data/lilsr-big/data"
index =       "~/data/lilsr-big/kannolo"
qrels_path =  ""
experiment =  "experiments/best_configs/msmarco-v1/splade-lilsr-big/svb_grid/runs"

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth_100.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "lilsr-big_svb_grid"

[indexing_parameters]
m =               32
ef-construction = 2000
metric =          "dotproduct"

[query]
    # f16 best k100 r90: distance-adaptive ef320 lambda0.05 (f16 graph achieved 90.232)
    [query."recall_90"]
    early-termination = "distance-adaptive"
    ef-search =      320
    lambda =         0.05
    compression =    "stream-v-byte"
    permute =        true
    # f16 best k100 r95: distance-adaptive ef240 lambda0.2 (f16 graph achieved 95.169)
    [query."recall_95"]
    early-termination = "distance-adaptive"
    ef-search =      240
    lambda =         0.2
    compression =    "stream-v-byte"
    permute =        true
