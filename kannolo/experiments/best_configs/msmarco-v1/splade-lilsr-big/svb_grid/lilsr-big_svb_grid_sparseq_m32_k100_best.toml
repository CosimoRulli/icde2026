name =        "lilsr-big_svb_grid_sparseq_m32_k100_best"
title =       "DotPackingSparse scalar-u8 (fast dp8 kernel, in-memory convert) -- m=32, k=100"
description = "In-memory convert of the EXISTING dp8 (dotpacking8-scalaru8) index to the dotpacking8-sparse-scalar encoder (--convert-in-memory): dp8 is decoded to f32 and re-quantized with the same scalar-u8 quantizer, so the u8 codes + dp8 graph + dp8 EGB permutation are reused. Recall == the dp8 \\hnswsvbdp rows; only the (faster) SIMD kernel changes. No rebuild."
dataset =     "SPLADE v3 lilsr-big on MS-MARCO"
dataset-type = "sparse"
component-type = "u16"
# value-type intentionally omitted: dotpacking8-scalaru8 (source) ignores --value-type.
build-command =       "./target/release/hnsw_build"
permutation-command = "./target/release/hnsw_egb_permutation"
query-command =       "./target/release/hnsw_compress_search"
encoder =     "dotpacking8-scalaru8"

[settings]
k =           100
num-runs =    1
NUMA =        "numactl --physcpubind='0' --localalloc"
build =       true     # build the dp8 index (converted to dotpacking8-sparse-scalar in memory at query time)
permutation = true     # build the dp8 EGB permutation from the index
convert_target_encoder = "dotpacking8-sparse-scalar"
metric =      ""

[folder]
data =        "~/data/lilsr-big/data"
index =       "~/data/lilsr-big/kannolo"
qrels_path =  ""
experiment =  "experiments/best_configs/msmarco-v1/splade-lilsr-big/svb_grid/runs"

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth_100.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "lilsr-big_svb_grid"

[indexing_parameters]
m =               32
ef-construction = 2000
metric =          "dotproduct"

[query]
    # dp8 best k100 r90: none ef768 (dp8 achieved 90.968)
    [query."recall_90"]
    early-termination = "none"
    ef-search =      768
    lambda =         0.0
    compression =    "stream-v-byte"
    permute =        true
    # dp8 best k100 r95: none ef4096 (dp8 achieved 95.154)
    [query."recall_95"]
    early-termination = "none"
    ef-search =      4096
    lambda =         0.0
    compression =    "stream-v-byte"
    permute =        true
