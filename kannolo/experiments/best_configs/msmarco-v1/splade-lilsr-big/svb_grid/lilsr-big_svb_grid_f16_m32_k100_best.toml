name =        "lilsr-big_svb_grid_f16_m32_k100_best"
title =       "Best SVB-compressed configs (replicated) -- f16, m=32, k=100"
description = "Fastest config per target recall (recall >= target), distilled from the grid final_report.tsv. Builds the index and EGB permutation from the downloaded collection (build=true). Run with run_experiments.py."
dataset =     "SPLADE v3 lilsr-big on MS-MARCO"
dataset-type = "sparse"
component-type = "u16"
value-type =  "f16"
build-command =       "./target/release/hnsw_build"
permutation-command = "./target/release/hnsw_egb_permutation"
query-command =       "./target/release/hnsw_compress_search"
encoder =     "plain"

[settings]
k =           100
num-runs =    1
NUMA =        "numactl --physcpubind='0' --localalloc"
build =       true     # build the index from the downloaded collection
permutation = true     # build the EGB permutation from the index
metric =      ""

[folder]
data =        "~/data/lilsr-big/data"
index =       "~/data/lilsr-big/kannolo"
qrels_path =  ""
experiment =  "experiments/best_configs/msmarco-v1/splade-lilsr-big/svb_grid/runs"

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth_100.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "lilsr-big_svb_grid"

[indexing_parameters]
m =               32
ef-construction = 2000
metric =          "dotproduct"

[query]
    # Target Recall: 90 | Achieved: 90.232 | Query Time (us): 3873 | Bits/Edge: 19.09
    [query."recall_90"]
    early-termination = "distance-adaptive"
    ef-search =      320
    lambda =         0.05
    compression =    "stream-v-byte"
    permute =        true
    # Target Recall: 95 | Achieved: 95.169 | Query Time (us): 20345 | Bits/Edge: 19.09
    [query."recall_95"]
    early-termination = "distance-adaptive"
    ef-search =      240
    lambda =         0.2
    compression =    "stream-v-byte"
    permute =        true
